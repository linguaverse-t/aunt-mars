<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการตอนนิยาย - LinguaVerse</title>
    <link rel="icon" href="images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: { purple: '#D8B4FE', pink: '#F9A8D4', blue: '#A5F3FC', yellow: '#FDE68A', green: '#86EFAC', bg: '#FDF2F8' },
                        brand: { dark: '#4C1D95', primary: '#C084FC' }
                    },
                    fontFamily: { mali: ['Mali', 'cursive'], sarabun: ['Sarabun', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* CSS เฉพาะสำหรับจำลองการอ่านนิยาย */
        .novel-content p {
            text-indent: 2em; /* ย่อหน้า */
            margin-bottom: 1em; /* ระยะห่างระหว่างย่อหน้า */
            line-height: 1.8; /* ระยะห่างบรรทัด */
        }
    </style>
</head>
<body class="bg-pastel-bg font-mali text-gray-700 flex flex-col min-h-screen">

    <header id="navbar-container" class="sticky top-0 z-50"></header>
    <div id="auth-modal-container"></div>

    <main class="flex-grow container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-brand-dark mb-6 border-l-4 border-pastel-blue pl-4">
            <i class="fas fa-layer-group mr-2"></i>ระบบจัดการตอนนิยาย
        </h1>

        <div class="bg-white p-6 rounded-3xl shadow-lg border border-pastel-blue/30 mb-8">
            <label class="block text-lg font-bold mb-2 text-brand-dark">
                <span class="bg-pastel-blue text-brand-dark w-8 h-8 rounded-full flex items-center justify-center inline-block mr-2 text-sm">1</span>
                เลือกนิยายที่ต้องการจัดการ
            </label>
            <div class="relative">
                <select id="novelSelector" class="w-full p-3 pl-10 border rounded-xl focus:ring-2 focus:ring-pastel-blue outline-none font-saraban bg-gray-50 cursor-pointer appearance-none">
                    <option value="">-- กรุณาเลือกนิยาย --</option>
                    </select>
                <i class="fas fa-book absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <i class="fas fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            </div>
        </div>

        <div id="managementArea" class="hidden transition-opacity duration-500 opacity-0">
            
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-pastel-blue/30 mb-10">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="bg-pastel-purple text-white w-8 h-8 rounded-full flex items-center justify-center mr-2 text-sm">2</span>
                    ข้อมูลตอน (Episode)
                </h2>

                <form id="episodeForm" class="space-y-6">
                    <input type="hidden" id="episodeId"> <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-1">ลำดับตอน <span class="text-red-500">*</span></label>
                            <input type="number" id="episodeNumber" class="w-full p-2.5 border rounded-xl focus:ring-2 focus:ring-pastel-purple outline-none font-saraban text-center" placeholder="1" required>
                        </div>
                        
                        <div class="md:col-span-6">
                            <label class="block text-sm font-bold mb-1">ชื่อตอน <span class="text-red-500">*</span></label>
                            <input type="text" id="episodeTitle" class="w-full p-2.5 border rounded-xl focus:ring-2 focus:ring-pastel-purple outline-none font-saraban" placeholder="จุดเริ่มต้น..." required>
                        </div>

                        <div class="md:col-span-4">
                            <label class="block text-sm font-bold mb-1">ประเภท/ราคา <span class="text-red-500">*</span></label>
                            <select id="priceType" class="w-full p-2.5 border rounded-xl font-saraban cursor-pointer">
                                <option value="0">Free (0 Points)</option>
				<option value="-1">Daily Free (ฟรีจำกัดวันละ 3 ตอน)</option>
                                <option value="10">Standard (10 Points)</option>
                                <option value="15">Side/Special (15 Points)</option>
                                <option value="20">Extra/NC (20 Points)</option>
                            </select>
                            <div id="priceBadgePreview" class="mt-2 text-xs">
                                <span class="bg-gray-200 text-gray-600 px-2 py-1 rounded-md font-bold">ตัวอย่าง: Free</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2">เนื้อหาตอน (Content)</label>
<div class="border rounded-xl overflow-hidden border-gray-300">
    <div class="bg-gray-100 p-2 flex flex-wrap gap-2 border-b border-gray-300">
            <button type="button" onclick="formatDoc('bold')" class="p-1.5 hover:bg-white rounded" title="ตัวหนา"><i class="fas fa-bold"></i></button>
            <button type="button" onclick="formatDoc('italic')" class="p-1.5 hover:bg-white rounded" title="ตัวเอียง"><i class="fas fa-italic"></i></button>
            <button type="button" onclick="formatDoc('underline')" class="p-1.5 hover:bg-white rounded" title="ขีดเส้นใต้"><i class="fas fa-underline"></i></button>
            <div class="w-px h-6 bg-gray-300 mx-1"></div>
            
            <div class="relative inline-block">
                <button type="button" onclick="document.getElementById('colorDropdown').classList.toggle('hidden')" class="p-1.5 hover:bg-white rounded flex items-center gap-1">
                    <i class="fas fa-palette"></i> <i class="fas fa-chevron-down text-xs"></i>
                </button>
                <div id="colorDropdown" class="hidden absolute top-full left-0 bg-white border shadow-lg rounded p-2 grid grid-cols-5 gap-1 w-32 z-10">
                    </div>
            </div>

            <div class="w-px h-6 bg-gray-300 mx-1"></div>
            <button type="button" onclick="formatDoc('justifyLeft')" class="p-1.5 hover:bg-white rounded"><i class="fas fa-align-left"></i></button>
            <button type="button" onclick="formatDoc('justifyCenter')" class="p-1.5 hover:bg-white rounded"><i class="fas fa-align-center"></i></button>
            <button type="button" onclick="formatDoc('justifyRight')" class="p-1.5 hover:bg-white rounded"><i class="fas fa-align-right"></i></button>
            <div class="w-px h-6 bg-gray-300 mx-1"></div>
            <button type="button" onclick="formatDoc('insertHorizontalRule')" class="p-1.5 hover:bg-white rounded"><i class="fas fa-minus"></i></button>
            <button type="button" onclick="formatDoc('undo')" class="p-1.5 hover:bg-white rounded"><i class="fas fa-undo"></i></button>
            <button type="button" onclick="formatDoc('redo')" class="p-1.5 hover:bg-white rounded"><i class="fas fa-redo"></i></button>
        </div>

	<div id="editor" contenteditable="true" class="novel-content p-6 h-[450px] overflow-y-auto bg-white outline-none font-saraban text-lg leading-relaxed text-gray-800 cursor-pointer">
	</div>
</div>
<p class="text-xs text-gray-400 mt-1">* กด Enter เพื่อขึ้นย่อหน้าใหม่ (ระบบจะจัดย่อหน้าให้สวยงามอัตโนมัติ)</p>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <label class="block text-sm font-bold mb-2">สถานะการเผยแพร่</label>
                        <div class="flex flex-col md:flex-row gap-4 items-center">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" id="isPublished" checked class="w-5 h-5 text-pastel-purple rounded focus:ring-pastel-purple">
                                <span class="font-bold">เผยแพร่ตอนสู่สาธารณะ (เปิดให้อ่าน)</span>
                            </label>
                            <span class="text-xs text-gray-500 md:ml-4 border-l md:border-gray-300 md:pl-4">
                                *หากนำเครื่องหมายออก ตอนนี้จะถูกบันทึกเป็นแบบร่าง (Draft) แอดมินสามารถเข้ามาเปิดเผยแพร่ภายหลังได้
                            </span>
                        </div>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button type="submit" class="flex-1 bg-pastel-green hover:bg-green-400 text-white py-3 rounded-xl font-bold shadow-md transition transform hover:scale-105">
                            <i class="fas fa-save mr-2"></i> บันทึกตอน
                        </button>
                        <button type="button" onclick="resetForm()" class="px-6 bg-gray-200 hover:bg-gray-300 text-gray-600 rounded-xl font-bold transition">
                            <i class="fas fa-eraser mr-2"></i> ล้าง
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-lg border border-pastel-purple/30">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="bg-pastel-pink text-white w-8 h-8 rounded-full flex items-center justify-center mr-2 text-sm">3</span>
                    รายการตอนทั้งหมด
                </h2>
		<div class="mb-6 relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-search text-pastel-purple/60"></i>
                    </div>
                    <input type="text" id="searchEpInput" oninput="window.handleSearchEpisode(this.value)" class="w-full pl-11 pr-4 py-2.5 border border-pastel-purple/30 rounded-full text-sm font-saraban focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-shadow bg-pastel-purple/5 placeholder-pastel-purple/60 text-gray-700" placeholder="ค้นหาชื่อตอน หรือ เลขตอน...">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-pastel-bg text-brand-dark border-b border-pastel-pink">
                                <th class="p-3 rounded-tl-xl text-center w-20">#</th>
                                <th class="p-3">ชื่อตอน</th>
                                <th class="p-3 text-center w-32">ราคา</th>
                                <th class="p-3 text-center w-32">สถานะ</th>
                                <th class="p-3 text-center w-32 rounded-tr-xl">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="episodeTableBody" class="font-saraban text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
	    <div id="episodePaginationContainer" class="flex flex-col sm:flex-row items-center justify-between gap-4 mt-6 border-t border-gray-100 pt-6 hidden">
                    </div>
        </div>

    </main>

    <footer id="footer-container" class="mt-auto"></footer>

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<button id="scrollToTopBtn" class="fixed bottom-8 right-8 bg-pastel-purple hover:bg-brand-primary text-white p-4 rounded-full shadow-lg transition-all duration-300 opacity-0 translate-y-10 z-50 hidden">
    <i class="fas fa-arrow-up"></i>
</button>

    <script type="module" src="js/pages/manage-episode.js"></script>
    <script>
        // Global Helpers
        function formatDoc(cmd, value = null) {
            document.execCommand(cmd, false, value);
            document.getElementById('editor').focus();
        }
    </script>
</body>
</html>
